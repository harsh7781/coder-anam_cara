<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <!-- Stylesheet and script references -->
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Calculator container -->
    <div id="calculator" class="calculator">
        <!-- Display screen -->
        <div id="display" class="display">0</div>
        <!-- Buttons grid -->
        <div class="buttons">
            <!-- Row 1: Clear, Backspace, Divide -->
            <button id="btn-clear" class="btn clear" data-action="clear">C</button>
            <button id="btn-backspace" class="btn backspace" data-action="backspace">←</button>
            <button id="btn-divide" class="btn operator" data-action="operator" data-value="/">/</button>
            <!-- Row 2: 7, 8, 9, Multiply -->
            <button id="btn-7" class="btn digit" data-action="digit" data-value="7">7</button>
            <button id="btn-8" class="btn digit" data-action="digit" data-value="8">8</button>
            <button id="btn-9" class="btn digit" data-action="digit" data-value="9">9</button>
            <button id="btn-multiply" class="btn operator" data-action="operator" data-value="*">*</button>
            <!-- Row 3: 4, 5, 6, Subtract -->
            <button id="btn-4" class="btn digit" data-action="digit" data-value="4">4</button>
            <button id="btn-5" class="btn digit" data-action="digit" data-value="5">5</button>
            <button id="btn-6" class="btn digit" data-action="digit" data-value="6">6</button>
            <button id="btn-subtract" class="btn operator" data-action="operator" data-value="-">-</button>
            <!-- Row 4: 1, 2, 3, Add -->
            <button id="btn-1" class="btn digit" data-action="digit" data-value="1">1</button>
            <button id="btn-2" class="btn digit" data-action="digit" data-value="2">2</button>
            <button id="btn-3" class="btn digit" data-action="digit" data-value="3">3</button>
            <button id="btn-add" class="btn operator" data-action="operator" data-value="+">+</button>
            <!-- Row 5: 0, Decimal, Equals -->
            <button id="btn-0" class="btn digit" data-action="digit" data-value="0">0</button>
            <button id="btn-decimal" class="btn decimal" data-action="decimal" data-value=".">.</button>
            <button id="btn-equals" class="btn equals" data-action="equals">=</button>
        </div>
    </div>
    <!-- End of calculator -->
</body>
</html>
